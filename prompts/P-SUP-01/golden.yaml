prompt_id: P-SUP-01
nome: "Classificação de Ticket em Severidade"
version: 1.0.0
calibrated_by: "Fabio Garcia (autor da obra) — calibração inicial"
calibration_date: 2026-06-02
review_due: 2027-06-02
notas_de_calibracao: |
  Regra constitucional crítica do prompt: classificar por IMPACTO TÉCNICO
  e CONTRATUAL, NÃO por tom emocional do cliente. Este é o anti-padrão
  documentado no APX-L (changelog do P-SUP-01): a v0 classificava como S1
  qualquer ticket com "urgentíssimo" ou "vou cancelar", mesmo sem impacto
  objetivo.

  Escala adotada:
    - S1 CRÍTICA: produção fora do ar OU vazamento OU sangramento de dinheiro
    - S2 ALTA:    funcionalidade core degradada com impacto a múltiplos clientes
    - S3 MÉDIA:   bug afeta cliente único, workaround disponível
    - S4 BAIXA:   melhoria, débito técnico, dúvida operacional

  Schema obrigatório de saída: campo "indicadores_objetivos" como array
  com itens concretos (downtime, número de usuários, financeiro perdido).

cases:

  # ===========================================================================
  # FÁCEIS (10) — sanidade básica
  # ===========================================================================

  - id: P-SUP-01-F-001
    category: facil
    calibration_date: 2026-06-02
    input:
      ticket: |
        "URGENTE!!! Plataforma toda fora do ar há 30 minutos. Times de vendas
        parados, 200 usuários afetados. Status page diz tudo verde mas não
        loga ninguém. Já tentamos sair e entrar de novo, mesma coisa.
        Cliente Plano Enterprise."
      contexto_cliente: "Enterprise · SLA 99.9% · 200 usuários ativos"
    expected:
      classification: "S1"
      must_contain:
        - "downtime"
        - "S1"
        - "200 usuários"
      regex_required:
        - "(S1|severidade.*1|crítica)"
      json_keys:
        - "severidade"
        - "indicadores_objetivos"
    notes: |
      S1 canônico: outage de produção + Enterprise + 200 usuários impactados.
      O tom é urgente, mas a classificação não vem do tom, vem dos
      indicadores objetivos (downtime, número de usuários, plano contratual).

  - id: P-SUP-01-F-002
    category: facil
    calibration_date: 2026-06-02
    input:
      ticket: |
        "Olá, gostaria de saber como faço para exportar meu relatório de vendas
        em PDF. Vi a opção em CSV mas preciso enviar para meu diretor em
