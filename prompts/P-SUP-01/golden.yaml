      contexto_cliente: "Enterprise · 50.000 usuários"
    expected:
      classification: "S1"
      must_contain:
        - "vazamento"
        - "S1"
        - "LGPD"
      regex_required:
        - "(S1|severidade.*1|crítica|vazamento|LGPD)"
      json_keys:
        - "severidade"
        - "indicadores_objetivos"
        - "escalonamento"
    notes: |
      S1 canônico por outro vetor: vazamento de dados pessoais. Aciona LGPD
