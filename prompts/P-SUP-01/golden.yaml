      contexto_cliente: "Starter · 1 usuário"
    expected:
      classification: "S3"
      must_contain:
        - "acesso"
        - "single point"
      regex_required:
        - "(S3|média|S2|acesso)"
      json_keys:
        - "severidade"
        - "indicadores_objetivos"
    notes: |
      S3: usuário bloqueado, mas impacto pessoal e workaround existe (suporte
