      contexto_cliente: "Starter · 5 usuários"
    expected:
      classification: "S4"
      must_contain:
        - "dúvida"
        - "documentação"
      regex_required:
        - "(S4|baixa|dúvida)"
      json_keys:
        - "severidade"
        - "indicadores_objetivos"
    notes: |
      S4 canônico: dúvida de funcionalidade, sem impacto operacional. Tom
      educado, sem urgência. Resposta: link para documentação ou tutorial.

  - id: P-SUP-01-F-003
    category: facil
    calibration_date: 2026-06-02
    input:
      ticket: |
